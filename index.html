<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d0d0d">
    <title>My Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d0d;
            --text: #e0e0e0;
            --muted: #666;
            --border: #2a2a2a;
            --accent: #4a9eff;
            --bg-hover: #1a1a1a;
            color-scheme: dark;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 24px;
            padding-top: calc(80px + env(safe-area-inset-top));
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        header {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        h1::before {
            content: '# ';
            color: var(--accent);
        }

        .muted {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: #141414;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, background-color 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .game-item:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .game-item:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .game-item.disabled {
            opacity: 0.4;
            cursor: default;
        }

        .game-item.disabled:hover {
            border-color: var(--border);
            background: #141414;
        }

        .game-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .game-name {
            font-size: 1rem;
            font-weight: 500;
        }

        .game-url {
            color: var(--muted);
            font-size: 0.8rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .game-status {
            flex-shrink: 0;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }

        .game-status.online {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .game-status.coming {
            color: var(--muted);
        }

        footer {
            margin-top: 80px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.8rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        footer a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
            html {
                scroll-behavior: auto;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 40px 16px;
                padding-top: calc(40px + env(safe-area-inset-top));
                padding-bottom: calc(40px + env(safe-area-inset-bottom));
            }

            .game-item {
                padding: 16px;
                gap: 12px;
                min-height: 72px;
            }

            .game-status {
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>My Games</h1>
            <p class="muted">// personal projects</p>
        </header>

        <nav aria-label="游戏列表">
            <div id="games-list" class="games-list"></div>
        </nav>

        <footer>
            <p>built with <a href="https://phaser.io" target="_blank" rel="noopener noreferrer">Phaser.js</a></p>
        </footer>
    </div>

    <script>
        const GAMES = [
            {
                name: '中国象棋',
                url: 'http://lw0710.top/chinese-chess',
                status: 'online'
            },
            {
                name: '格斗游戏',
                url: 'http://lw0710.top/fight-game',
                status: 'online'
            },
            {
                name: '擂台霸主',
                url: 'http://lw0710.top/hero-impact',
                status: 'online'
            },
            {
                name: '更多游戏',
                url: '#',
                status: 'coming'
            }
        ];

        function renderGames() {
            const container = document.getElementById('games-list');
            container.innerHTML = GAMES.map(game => `
                <a href="${game.url}" 
                   class="game-item ${game.url === '#' ? 'disabled' : ''}"
                   ${game.url === '#' ? 'aria-disabled="true" tabindex="0" onclick="return false;"' : 'rel="noopener noreferrer"'}
                   aria-label="${game.name} - ${game.status === 'online' ? '在线' : '开发中'}">
                    <div class="game-info">
                        <span class="game-name">${game.name}</span>
                        <span class="game-url">${game.url === '#' ? 'wip…' : game.url}</span>
                    </div>
                    <span class="game-status ${game.status}">${game.status === 'online' ? 'online' : 'wip'}</span>
                </a>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderGames);
    </script>
</body>
</html>
