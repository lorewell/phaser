<svg xmlns="http://www.w3.org/2000/svg" width="40" height="90" viewBox="0 0 40 90">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(235, 190, 140)"/>
      <stop offset="100%" stop-color="rgb(185, 135, 95)"/>
    </linearGradient>
    <linearGradient id="sleeveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(45, 125, 245)"/>
      <stop offset="100%" stop-color="rgb(25, 65, 165)"/>
    </linearGradient>
    <linearGradient id="gloveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgb(40, 120, 240)"/>
      <stop offset="100%" stop-color="rgb(15, 50, 130)"/>
    </linearGradient>
  </defs>
  <!-- 袖子（上臂） -->
  <rect x="6" y="1" width="28" height="40" rx="10" fill="url(#sleeveGrad)" stroke="rgb(20, 60, 160)" stroke-width="1.5"/>
  <!-- 袖子褶皱 -->
  <path d="M10 10 Q20 14 30 10" stroke="rgb(20, 60, 160)" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M10 22 Q20 26 30 22" stroke="rgb(20, 60, 160)" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- 前臂 -->
  <rect x="8" y="38" width="24" height="34" rx="8" fill="url(#skinGrad)" stroke="rgb(170, 120, 80)" stroke-width="1.5"/>
  <!-- 肌肉线条 -->
  <path d="M12 48 Q20 52 28 48" stroke="rgb(170, 120, 80)" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- 护腕 -->
  <rect x="6" y="64" width="28" height="10" rx="3" fill="url(#gloveGrad)" stroke="rgb(20, 60, 160)" stroke-width="1.5"/>
  <!-- 拳头 -->
  <ellipse cx="20" cy="83" rx="13" ry="11" fill="url(#skinGrad)" stroke="rgb(170, 120, 80)" stroke-width="2"/>
  <!-- 指节 -->
  <line x1="10" y1="77" x2="10" y2="81" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="75" x2="15" y2="79" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="74" x2="20" y2="78" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="75" x2="25" y2="79" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="77" x2="30" y2="81" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
</svg>