<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="color-scheme" content="dark">
    <title>My Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d0d;
            --bg-card: #141414;
            --bg-hover: #1a1a1a;
            --text: #e0e0e0;
            --text-muted: #666;
            --border: #2a2a2a;
            --accent: #d4a355;
            --accent-dim: rgba(212, 163, 85, 0.15);
            --online: #4ade80;
            --pixel-tile: #1a1a1a;
            color-scheme: dark;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            line-height: 1.6;
        }

        /* 像素风格背景 */
        .pixel-bg {
            position: fixed;
            inset: 0;
            background-color: var(--bg);
            background-image: 
                linear-gradient(45deg, var(--pixel-tile) 25%, transparent 25%),
                linear-gradient(-45deg, var(--pixel-tile) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, var(--pixel-tile) 75%),
                linear-gradient(-45deg, transparent 75%, var(--pixel-tile) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            opacity: 0.4;
            z-index: -1;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 60px 20px;
            padding-top: calc(60px + env(safe-area-inset-top));
            padding-bottom: calc(60px + env(safe-area-inset-bottom));
        }

        /* 像素风格头部 */
        header {
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--border);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0.3;
        }

        h1 {
            font-size: clamp(1.25rem, 5vw, 1.5rem);
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        h1::before {
            content: '> ';
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* 游戏列表 */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s, background-color 0.15s, transform 0.1s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            min-height: 72px;
            position: relative;
        }

        /* 像素角落装饰 */
        .game-item::before,
        .game-item::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .game-item::before {
            top: 4px;
            left: 4px;
            border-top: 2px solid var(--accent);
            border-left: 2px solid var(--accent);
            background: transparent;
        }

        .game-item::after {
            bottom: 4px;
            right: 4px;
            border-bottom: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
            background: transparent;
        }

        .game-item:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .game-item:hover::before,
        .game-item:hover::after {
            opacity: 1;
        }

        .game-item:active {
            transform: scale(0.98);
        }

        .game-item:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .game-item.disabled {
            opacity: 0.4;
            cursor: default;
        }

        .game-item.disabled:hover {
            border-color: var(--border);
            background: var(--bg-card);
        }

        .game-item.disabled::before,
        .game-item.disabled::after {
            display: none;
        }

        .game-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
            flex: 1;
        }

        .game-name {
            font-size: 1rem;
            font-weight: 500;
        }

        .game-url {
            color: var(--text-muted);
            font-size: 0.75rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .game-status {
            flex-shrink: 0;
            font-size: 0.7rem;
            padding: 4px 10px;
            border: 1px solid currentColor;
            letter-spacing: 0.1em;
        }

        .game-status.online {
            color: var(--online);
            border-color: var(--online);
            background: rgba(74, 222, 128, 0.08);
        }

        .game-status.coming {
            color: var(--text-muted);
        }

        /* 页脚 */
        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
            position: relative;
        }

        footer::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 0;
            width: 60px;
            height: 2px;
            background: var(--accent);
            opacity: 0.5;
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        footer a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 2px;
        }

        /* 减少动画 */
        @media (prefers-reduced-motion: reduce) {
            * {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
            html {
                scroll-behavior: auto;
            }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .container {
                padding: 40px 16px;
            }

            .game-item {
                padding: 14px 16px;
            }

            .game-status {
                padding: 4px 8px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-bg" aria-hidden="true"></div>
    
    <div class="container">
        <header>
            <h1>My Games</h1>
            <p class="subtitle">// personal projects</p>
        </header>

        <nav aria-label="游戏列表">
            <div id="games-list" class="games-list"></div>
        </nav>

        <footer>
            <p>built with <a href="https://phaser.io" target="_blank" rel="noopener noreferrer">Phaser.js</a></p>
        </footer>
    </div>

    <script>
        const GAMES = [
            {
                name: '中国象棋',
                url: 'http://lw0710.top/chinese-chess',
                status: 'online'
            },
            {
                name: '格斗游戏',
                url: 'http://lw0710.top/fight-game',
                status: 'online'
            },
            {
                name: '擂台霸主',
                url: 'http://lw0710.top/hero-impact',
                status: 'online'
            },
            {
                name: '贪吃蛇',
                url: '#',
                status: 'coming'
            },
            {
                name: '俄罗斯方块',
                url: '#',
                status: 'coming'
            }
        ];

        function renderGames() {
            const container = document.getElementById('games-list');
            container.innerHTML = GAMES.map((game, index) => `
                <a href="${game.url}" 
                   class="game-item ${game.url === '#' ? 'disabled' : ''}"
                   ${game.url === '#' ? 'aria-disabled="true" tabindex="0" onclick="return false;"' : 'rel="noopener noreferrer"'}
                   aria-label="${game.name} - ${game.status === 'online' ? '在线' : '开发中'}">
                    <div class="game-info">
                        <span class="game-name">${game.name}</span>
                        <span class="game-url">${game.url === '#' ? 'wip…' : game.url}</span>
                    </div>
                    <span class="game-status ${game.status}">${game.status === 'online' ? 'ONLINE' : 'WIP'}</span>
                </a>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderGames);
    </script>
</body>
</html>
