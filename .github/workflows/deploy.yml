name: Phaser Deploy

on:
  push:
    branches:
      - 'demo/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载你的代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 直接同步文件到服务器
      - name: Sync to Server
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          # 因为你没有编译过程，SOURCE 填 "." 代表上传整个仓库内容
          # 但为了干净，我们排除掉 .git 和 .github 文件夹
          SOURCE: "./"
          EXCLUDE: "/.git/, /.github/"
          # 目标路径依然保持不变
          TARGET: "/opt/1panel/www/sites/games/index/${{ github.ref_name }}"
          ARGS: "-avz --delete"
