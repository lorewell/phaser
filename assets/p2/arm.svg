<svg xmlns="http://www.w3.org/2000/svg" width="40" height="90" viewBox="0 0 40 90">
  <defs>
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(230, 180, 130)"/>
      <stop offset="100%" stop-color="rgb(175, 130, 90)"/>
    </linearGradient>
    <linearGradient id="sleeveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(40, 120, 240)"/>
      <stop offset="100%" stop-color="rgb(20, 60, 160)"/>
    </linearGradient>
  </defs>
  <!-- 袖子（上臂） -->
  <rect x="8" y="2" width="24" height="38" rx="8" fill="url(#sleeveGrad)" stroke="rgb(20, 60, 160)" stroke-width="1.5"/>
  <!-- 前臂 -->
  <rect x="10" y="38" width="20" height="32" rx="6" fill="url(#armGrad)" stroke="rgb(175, 130, 90)" stroke-width="1.5"/>
  <!-- 护腕 -->
  <rect x="8" y="62" width="24" height="8" rx="3" fill="rgb(40, 120, 240)" stroke="rgb(20, 60, 160)" stroke-width="1.5"/>
  <!-- 拳头 -->
  <ellipse cx="20" cy="82" rx="12" ry="10" fill="url(#armGrad)" stroke="rgb(175, 130, 90)" stroke-width="2"/>
  <!-- 拳头指节 -->
  <line x1="11" y1="76" x2="11" y2="80" stroke="rgb(175, 130, 90)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="74" x2="16" y2="78" stroke="rgb(175, 130, 90)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="74" x2="21" y2="78" stroke="rgb(175, 130, 90)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="75" x2="26" y2="79" stroke="rgb(175, 130, 90)" stroke-width="1.5" stroke-linecap="round"/>
</svg>