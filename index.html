<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f13;
            --bg-secondary: #1a1a21;
            --bg-card: #232329;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.6s ease-out;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        .logo svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a0a0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .game-card.disabled {
            cursor: not-allowed;
        }

        .game-card.disabled:hover {
            transform: none;
            box-shadow: none;
            border-color: var(--border);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #8b5cf6);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .game-card:not(.disabled):hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .game-card:not(.disabled):hover::before {
            opacity: 1;
        }

        .card-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.1));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .game-card:not(.disabled):hover .card-icon {
            transform: scale(1.05);
        }

        .card-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }

        .card-status.online {
            color: #22c55e;
        }

        .card-status.online::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .card-status.developing {
            color: #f59e0b;
        }

        .card-status.developing::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #f59e0b;
            border-radius: 50%;
        }

        .card-status.coming-soon {
            color: #6b7280;
        }

        .card-status.coming-soon::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #6b7280;
            border-radius: 50%;
        }

        .card-arrow {
            opacity: 0;
            transition: all 0.3s;
        }

        .game-card:not(.disabled):hover .card-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        .card-arrow svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 2;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--accent-hover);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .game-card {
            animation: fadeIn 0.5s ease-out both;
        }

        @media (max-width: 640px) {
            .container {
                padding: 40px 16px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>

    <div class="container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" />
                    <path d="M2 17l10 5 10-5" />
                    <path d="M2 12l10 5 10-5" />
                </svg>
            </div>
            <h1>游戏中心</h1>
            <p class="subtitle">精选网页游戏，随时畅玩</p>
        </header>

        <div id="games-grid" class="games-grid"></div>

        <footer>
            <p>Built with <a href="https://phaser.io" target="_blank">Phaser.js</a></p>
        </footer>
    </div>

    <script>
        // ============================================
        // 游戏列表配置 - 在此添加或修改游戏
        // ============================================
        const GAMES = [
            {
                name: '中国象棋',
                url: 'http://lw0710.top/chinese-chess',
                desc: '经典中国象棋，人机对战模式，挑战AI提升棋艺。',
                status: 'online',
                icon: `<svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                    <line x1="15" y1="3" x2="15" y2="21"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="3" y1="15" x2="21" y2="15"/>
                </svg>`
            },
            {
                name: '格斗游戏',
                url: 'http://lw0710.top/fight-game',
                desc: '经典中国象棋，人机对战模式，挑战AI提升棋艺。',
                status: 'online',
                icon: `<svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                    <line x1="15" y1="3" x2="15" y2="21"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="3" y1="15" x2="21" y2="15"/>
                </svg>`
            },
            {
                name: '更多游戏',
                url: '#',
                desc: '持续更新中，敬请期待更多精彩游戏。',
                status: 'coming-soon',
                icon: `<svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                </svg>`
            }
        ];

        // 状态显示文案
        const STATUS_TEXT = {
            'online': '在线',
            'developing': '开发中',
            'coming-soon': '即将上线'
        };

        // 渲染游戏卡片
        function renderGames() {
            const grid = document.getElementById('games-grid');
            const isDisabled = (url) => url === '#';

            grid.innerHTML = GAMES.map((game, index) => `
                <a href="${game.url}" 
                   class="game-card ${isDisabled(game.url) ? 'disabled' : ''}"
                   style="animation-delay: ${0.1 + index * 0.1}s"
                   ${isDisabled(game.url) ? 'onclick="return false;"' : ''}>
                    <div class="card-icon">
                        ${game.icon}
                    </div>
                    <h3 class="card-title">${game.name}</h3>
                    <p class="card-desc">${game.desc}</p>
                    <div class="card-footer">
                        <span class="card-status ${game.status}">${STATUS_TEXT[game.status]}</span>
                        <span class="card-arrow">
                            <svg viewBox="0 0 24 24">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </span>
                    </div>
                </a>
            `).join('');
        }

        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', renderGames);
    </script>
</body>

</html>
