<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射击游戏 - Phaser 3</title>
    <script src="phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            border: 2px solid #3498db;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
            width: 500px;
            height: 700px;
        }

        .game-info {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div>
        <div class="game-info">
            <h2>🚀 太空射击游戏</h2>
            <p>使用 ← → 移动，空格键射击</p>
        </div>
        <div id="gameContainer"></div>
    </div>

    <script>
        // 游戏配置
        const config = {
            type: Phaser.AUTO,
            width: 500,
            height: 700,
            parent: 'gameContainer',
            backgroundColor: '#000033',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        // 游戏变量
        let player;
        let cursors;
        let spacebar;
        let enemies;
        let bullets;
        let stars;
        let score = 0;
        let scoreText;
        let gameOver = false;
        let lastFired = 0;
        let bulletPenetrate = false; // 新增：子弹穿透控制，false=单次击中，true=穿透

        // 创建游戏实例
        const game = new Phaser.Game(config);

        function preload() {
            // 加载背景图片
            this.load.image('spaceBg', './images/background.png');

            // 加载玩家子弹图片
            this.load.image('bulletPlayer', './images/bullet_player.png');
            // 加载玩家精灵表
            this.load.spritesheet('player', './images/player_sheet.png', {
                frameWidth: 102,
                frameHeight: 126,
                endFrame: 1
            });
            // 加载玩家爆炸效果精灵表
            this.load.spritesheet('playerDown', './images/player_down.png', {
                frameWidth: 102,
                frameHeight: 126,
                endFrame: 3
            });

            // 加载敌人1图片
            this.load.image('enemy', './images/enemy1.png');
        }

        function create() {
            // 创建循环滚动的背景
            this.bg = this.add.tileSprite(250, 350, 500, 700, 'spaceBg');
            this.bg.setScrollFactor(0);
            this.bgScrollSpeed = 2; // 控制滚动速度

            // 玩家图片加载成功后创建动画
            createPlayerAnimation.call(this);
            player = this.physics.add.sprite(250, 650, 'player');
            player.setCollideWorldBounds(true);
            player.setScale(0.5);
            player.body.setSize(player.width * 0.8, player.height * 0.8);
            player.anims.play('playerFly');


            // 使用图片创建子弹组
            bullets = this.physics.add.group({
                defaultKey: 'bulletPlayer',
                maxSize: 15
            });
            // 设置子弹属性
            bullets.children.iterate((bullet) => {
                bullet.setScale(0.8); // 根据实际图片调整
                if (bullet.body) {
                    bullet.body.setSize(bullet.width * 1, bullet.height * 1);
                }
            });

            // 创建敌人组
            enemies = this.physics.add.group();
            createEnemies.call(this);

            // 调整每个敌人的碰撞体
            enemies.children.iterate((enemy) => {
                enemy.body.setSize(44, 30);
            });

            // 设置碰撞检测
            this.physics.add.overlap(bullets, enemies, hitEnemy, null, this);
            this.physics.add.overlap(player, enemies, gameOverHandler, null, this);

            // 输入控制
            cursors = this.input.keyboard.createCursorKeys();
            spacebar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
            keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
            keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);

            // 分数显示
            scoreText = this.add.text(16, 16, '分数: 0', {
                fontSize: '20px', // 稍微调小字体
                fill: '#fff',
                fontFamily: 'Arial',
                backgroundColor: '#00000066',
                padding: { x: 8, y: 4 }
            });

            // 游戏说明 - 位置调整
            this.add.text(16, 650, '← → 移动飞船，空格键射击', { // 调整到靠近底部
                fontSize: '14px', // 调小字体
                fill: '#aaa',
                fontFamily: 'Arial',
                backgroundColor: '#00000066',
                padding: { x: 8, y: 4 }
            });
        }

        // 获取不重叠的敌人生成位置
        function getNonOverlappingEnemyPosition() {
            const enemyRadius = 30; // 敌人的碰撞半径（根据实际大小调整）
            let attempts = 0;
            let positionFound = false;
            let x, y;

            // 尝试找到不重叠的位置（最多尝试50次）
            while (!positionFound && attempts < 50) {
                x = Phaser.Math.Between(20, 460);
                y = Phaser.Math.Between(-800, -20);

                // 检查是否与现有敌人重叠
                positionFound = true;
                enemies.children.iterate((existingEnemy) => {
                    if (existingEnemy.active) {
                        const distance = Phaser.Math.Distance.Between(x, y, existingEnemy.x, existingEnemy.y);
                        if (distance < enemyRadius * 2) { // 两倍半径确保有足够间距
                            positionFound = false;
                        }
                    }
                });

                attempts++;
            }

            // 如果找不到合适位置，使用随机位置
            if (!positionFound) {
                x = Phaser.Math.Between(20, 460);
                y = Phaser.Math.Between(-600, -20);
            }

            return { x, y };
        }

        function createPlayerAnimation() {
            this.anims.create({
                key: 'playerFly',
                frames: this.anims.generateFrameNumbers('player', {
                    start: 0,
                    end: 1
                }),
                frameRate: 6,    // 每秒6帧（适中的闪烁速度）
                repeat: -1,      // 无限循环
                yoyo: true       // 来回播放（0->1->0->1...）
            });

            // 创建爆炸动画
            this.anims.create({
                key: 'explode',
                frames: this.anims.generateFrameNumbers('playerDown', {
                    start: 0,
                    end: 7
                }),
                frameRate: 15,
                repeat: 0,      // 只播放一次
                hideOnComplete: true // 播放完成后隐藏
            });
        }

        function update(time) {
            if (gameOver) return;

            // 背景持续滚动（关键！）
            this.bg.tilePositionY += this.bgScrollSpeed;

            // 玩家移动
            if (cursors.left.isDown || keyA.isDown) {
                player.setVelocityX(-280);
            } else if (cursors.right.isDown || keyD.isDown) {
                player.setVelocityX(280);
            } else {
                player.setVelocityX(0);
            }

            // 射击（限制射速）
            if (spacebar.isDown && time > lastFired) {
                fireBullet.call(this);
                lastFired = time + 200; // 200ms 冷却
            }

            // 回收子弹
            bullets.children.iterate((bullet) => {
                if (bullet.active && bullet.y < -20) {
                    bullet.setActive(false);
                    bullet.setVisible(false);
                }
            });

            // 移动敌人 - 调整边界检查
            enemies.children.iterate((enemy) => {
                if (enemy.active) {
                    enemy.y += enemy.speed;

                    // 修改边界为700
                    if (enemy.y > 690) {
                        resetEnemyPosition(enemy); // 使用统一的复位函数
                    }
                }
            });
        }


        // 创建敌人 - 使用复用函数
        function createEnemies() {
            for (let i = 0; i < 15; i++) {
                const position = getNonOverlappingEnemyPosition();

                const enemy = enemies.create(position.x, position.y, 'enemy');
                enemy.setScale(1);
                enemy.speed = 1;
                enemy.setBounce(1);
            }
        }


        // 发射子弹 - 修复版本
        function fireBullet() {
            const bullet = bullets.get(player.x, player.y - 20);
            if (bullet) {
                bullet.setActive(true);
                bullet.setVisible(true);
                bullet.setVelocityY(-400);

                // 设置子弹生命周期（自动回收）
                this.time.delayedCall(3000, () => {
                    if (bullet.active) {
                        bullet.setActive(false);
                        bullet.setVisible(false);
                    }
                });

                playLaserSound.call(this);
            } else {
                console.log('❌ 没有可用的子弹！对象池已满');
            }
        }

        // 击中敌人
        function hitEnemy(bullet, enemy) {
            // 如果穿透模式关闭，子弹消失
            if (!bulletPenetrate) {
                bullet.setActive(false);
                bullet.setVisible(false);
                bullet.x = -100;
                bullet.y = -100;
            }
            resetEnemyPosition(enemy);

            // 分数增加
            score += 10;
            scoreText.setText('分数: ' + score);

            // 爆炸效果

            // 播放音效（模拟）
            playExplosionSound.call(this);

            // 每得100分增加难度
            if (score % 100 === 0) {
                increaseDifficulty();
            }
        }

        // 游戏结束
        function gameOverHandler(player, enemy) {
            if (gameOver) return; // 防止重复触发
            gameOver = true;

            this.physics.pause();

            const explosion = this.add.sprite(player.x, player.y, 'playerDown');
            explosion.setScale(0.5);
            explosion.anims.play('explode');

            // 玩家闪烁效果
            this.tweens.add({
                targets: player,
                alpha: 0,
                duration: 100,
                yoyo: true,
                repeat: 5,
                onComplete: () => {
                    player.setTint(0xff0000);
                    player.setAlpha(0.5);
                }
            });

            player.setVisible(false);

            this.time.delayedCall(500, () => {
                this.physics.pause();

                // 显示游戏结束文字
                showGameOverText.call(this);
            });
        }

        // 提取显示游戏结束文字为独立函数
        function showGameOverText() {
            // 显示游戏结束文字
            const gameOverText = this.add.text(250, 300, '游戏结束!', {
                fontSize: '36px', // 调小字体
                fill: '#ff0000',
                fontFamily: 'Arial',
                fontStyle: 'bold',
                backgroundColor: '#000000aa',
                padding: { x: 15, y: 8 }
            });
            gameOverText.setOrigin(0.5);

            const finalScoreText = this.add.text(250, 350, '最终分数: ' + score, {
                fontSize: '24px', // 调小字体
                fill: '#fff',
                fontFamily: 'Arial',
                backgroundColor: '#000000aa',
                padding: { x: 12, y: 6 }
            });
            finalScoreText.setOrigin(0.5);

            const restartText = this.add.text(250, 400, '点击屏幕重新开始', {
                fontSize: '20px', // 调小字体
                fill: '#00ff00',
                fontFamily: 'Arial',
                backgroundColor: '#000000aa',
                padding: { x: 12, y: 6 }
            });
            restartText.setOrigin(0.5);

            // 重新开始游戏 - 修复版本
            this.input.once('pointerdown', () => {
                // 重置所有游戏状态变量
                score = 0;
                gameOver = false;
                lastFired = 0;

                // 重新开始场景
                this.scene.restart();
            });
        }

        // 加强重置函数
        function resetEnemyPosition(enemy) {
            const position = getNonOverlappingEnemyPosition();

            enemy.x = position.x;
            enemy.y = position.y;
            enemy.setActive(true);
            enemy.setVisible(true);
            if (enemy.body) {
                enemy.body.enable = true;  // 确保物理体启用
            }
        }

        // 增加难度
        function increaseDifficulty() {
            // enemies.children.iterate((enemy) => {
            //     enemy.speed += 1;
            // });
        }

        // 模拟音效函数
        function playLaserSound() {
            // 在实际项目中这里会播放音效文件
            console.log('🔊 激光音效');
        }

        function playExplosionSound() {
            // 在实际项目中这里会播放音效文件
            console.log('💥 爆炸音效');
        }
    </script>
</body>

</html>
