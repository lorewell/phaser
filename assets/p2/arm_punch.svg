<svg xmlns="http://www.w3.org/2000/svg" width="90" height="40" viewBox="0 0 90 40">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgb(235, 190, 140)"/>
      <stop offset="100%" stop-color="rgb(185, 135, 95)"/>
    </linearGradient>
    <linearGradient id="sleeveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgb(45, 125, 245)"/>
      <stop offset="100%" stop-color="rgb(25, 65, 165)"/>
    </linearGradient>
    <linearGradient id="gloveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(40, 120, 240)"/>
      <stop offset="100%" stop-color="rgb(15, 50, 130)"/>
    </linearGradient>
  </defs>
  <!-- 袖子（上臂） -->
  <rect x="2" y="6" width="40" height="28" rx="10" fill="url(#sleeveGrad)" stroke="rgb(20, 60, 160)" stroke-width="1.5"/>
  <!-- 袖子褶皱 -->
  <path d="M8 12 Q14 16 22 12" stroke="rgb(20, 60, 160)" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M8 24 Q14 28 22 24" stroke="rgb(20, 60, 160)" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- 前臂 -->
  <rect x="38" y="8" width="34" height="24" rx="8" fill="url(#skinGrad)" stroke="rgb(170, 120, 80)" stroke-width="1.5"/>
  <!-- 肌肉线条 -->
  <path d="M42 16 Q54 20 66 16" stroke="rgb(170, 120, 80)" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- 护腕 -->
  <rect x="64" y="6" width="10" height="28" rx="3" fill="url(#gloveGrad)" stroke="rgb(20, 60, 160)" stroke-width="1.5"/>
  <!-- 拳头 -->
  <ellipse cx="82" cy="20" rx="11" ry="13" fill="url(#skinGrad)" stroke="rgb(170, 120, 80)" stroke-width="2"/>
  <!-- 指节 -->
  <line x1="76" y1="12" x2="80" y2="12" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="74" y1="17" x2="78" y2="17" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="74" y1="22" x2="78" y2="22" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="27" x2="80" y2="27" stroke="rgb(150, 100, 60)" stroke-width="1.5" stroke-linecap="round"/>
</svg>