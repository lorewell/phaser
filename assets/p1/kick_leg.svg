<svg xmlns="http://www.w3.org/2000/svg" width="60" height="100" viewBox="0 0 60 100">
  <defs>
    <linearGradient id="klegGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(255, 110, 130)"/>
      <stop offset="50%" stop-color="rgb(225, 45, 75)"/>
      <stop offset="100%" stop-color="rgb(145, 25, 45)"/>
    </linearGradient>
    <linearGradient id="kshoeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>
  <!-- 大腿 -->
  <rect x="14" y="2" width="28" height="44" rx="11" fill="url(#klegGrad)" stroke="rgb(140, 20, 40)" stroke-width="1.5"/>
  <!-- 裤子褶皱 -->
  <path d="M18 12 Q28 16 36 12" stroke="rgb(140, 20, 40)" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- 护膝 -->
  <ellipse cx="28" cy="28" rx="13" ry="10" fill="rgb(220, 40, 70)" stroke="rgb(140, 20, 40)" stroke-width="1.5"/>
  <ellipse cx="28" cy="28" rx="7" ry="6" fill="rgb(255, 100, 120)" opacity="0.3"/>
  <!-- 小腿 -->
  <rect x="16" y="44" width="24" height="38" rx="8" fill="url(#klegGrad)" stroke="rgb(140, 20, 40)" stroke-width="1.5"/>
  <!-- 踢出的靴子（水平） -->
  <rect x="8" y="78" width="48" height="20" rx="7" fill="url(#kshoeGrad)" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="52" cy="88" rx="11" ry="10" fill="url(#kshoeGrad)" stroke="#111" stroke-width="1.5"/>
  <!-- 靴子高光 -->
  <path d="M12 82 Q30 79 50 82" stroke="#888" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- 鞋底 -->
  <path d="M8 96 Q30 100 56 96" stroke="#333" stroke-width="1.5" fill="none"/>
</svg>