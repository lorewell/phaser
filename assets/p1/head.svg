<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="skinGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgb(245, 200, 160)"/>
      <stop offset="100%" stop-color="rgb(195, 145, 105)"/>
    </radialGradient>
    <radialGradient id="hairGrad" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(240, 50, 80)"/>
      <stop offset="50%" stop-color="rgb(220, 40, 70)"/>
      <stop offset="100%" stop-color="rgb(180, 30, 55)"/>
    </linearGradient>
  </defs>
  <!-- 后发 -->
  <ellipse cx="40" cy="26" rx="30" ry="28" fill="url(#hairGrad)" stroke="#111" stroke-width="1.5"/>
  <path d="M12 28 Q8 45 14 55" stroke="#111" stroke-width="2" fill="none"/>
  <path d="M68 28 Q72 45 66 55" stroke="#111" stroke-width="2" fill="none"/>
  <!-- 脸 -->
  <ellipse cx="40" cy="46" rx="26" ry="29" fill="url(#skinGrad)" stroke="rgb(180, 130, 90)" stroke-width="1.5"/>
  <!-- 耳朵 -->
  <ellipse cx="14" cy="46" rx="5" ry="7" fill="url(#skinGrad)" stroke="rgb(180, 130, 90)" stroke-width="1"/>
  <ellipse cx="66" cy="46" rx="5" ry="7" fill="url(#skinGrad)" stroke="rgb(180, 130, 90)" stroke-width="1"/>
  <!-- 头带 -->
  <rect x="12" y="30" width="56" height="11" rx="3" fill="url(#bandGrad)" stroke="rgb(140, 20, 40)" stroke-width="1.5"/>
  <!-- 头带结 -->
  <path d="M68 33 Q76 28 74 38 Q70 34 68 38" fill="rgb(220, 40, 70)" stroke="rgb(140, 20, 40)" stroke-width="1"/>
  <path d="M68 36 Q75 42 72 45" fill="none" stroke="rgb(140, 20, 40)" stroke-width="1.5"/>
  <!-- 眉毛（愤怒） -->
  <path d="M22 38 L35 42" stroke="#332200" stroke-width="3" stroke-linecap="round"/>
  <path d="M58 38 L45 42" stroke="#332200" stroke-width="3" stroke-linecap="round"/>
  <!-- 眼睛左 -->
  <ellipse cx="29" cy="46" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="29" cy="47" rx="3.5" ry="4" fill="#222"/>
  <ellipse cx="30" cy="46" rx="1.2" ry="1.2" fill="white"/>
  <!-- 眼睛右 -->
  <ellipse cx="51" cy="46" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="51" cy="47" rx="3.5" ry="4" fill="#222"/>
  <ellipse cx="52" cy="46" rx="1.2" ry="1.2" fill="white"/>
  <!-- 鼻子 -->
  <path d="M38 52 Q40 58 42 52" stroke="rgb(180, 130, 90)" stroke-width="1.5" fill="none"/>
  <!-- 嘴（坚定） -->
  <path d="M32 63 Q40 60 48 63" stroke="#884422" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M34 64 Q40 67 46 64" stroke="#884422" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 下巴阴影 -->
  <path d="M28 70 Q40 76 52 70" stroke="rgb(180, 130, 90)" stroke-width="1" fill="none" opacity="0.5"/>
</svg>